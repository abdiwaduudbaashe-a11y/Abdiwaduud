<script>
    // 1. Saacadaha (Clocks)
    function updateClocks() {
        const fmt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        try {
            document.getElementById('local-clock').innerText = new Date().toLocaleTimeString('en-GB', fmt);
            document.getElementById('london-clock').innerText = new Date().toLocaleTimeString('en-GB', { ...fmt, timeZone: 'Europe/London' });
            document.getElementById('ny-clock').innerText = new Date().toLocaleTimeString('en-GB', { ...fmt, timeZone: 'America/New_York' });
            document.getElementById('tokyo-clock').innerText = new Date().toLocaleTimeString('en-GB', { ...fmt, timeZone: 'Asia/Tokyo' });
        } catch(e) { console.log("Saacadaha cilad baa ka jirta"); }
    }
    setInterval(updateClocks, 1000);

    // 2. Calculatorka (Xisaabiyaha) - Halkan ayaa la saxay
    function c(v) { 
        document.getElementById('calc-screen').value += v; 
    }
    function clr() { 
        document.getElementById('calc-screen').value = ''; 
    }
    function e() { 
        try { 
            let result = eval(document.getElementById('calc-screen').value);
            document.getElementById('calc-screen').value = result;
        } catch (err) { 
            alert('Xisaabtaada hubi!'); 
            clr();
        } 
    }

    // 3. AI Gemini-Style (Sheekaysiga) - Halkan ayaa la saxay
    function askAI() {
        let input = document.getElementById('user-msg');
        let box = document.getElementById('chat-output');
        
        if(input.value.trim() !== "") {
            // Qoraalkaaga
            box.innerHTML += <div style="color: #58a6ff; margin-bottom: 5px;"><b>Abdiwaduud:</b> ${input.value}</div>;
            
            let query = input.value.toLowerCase();
            input.value = ''; // Nadiifi meesha wax lagu qoro

            // AI Response (Sida Gemini)
            setTimeout(() => {
                let response = "Maasha'Allah, waan helay fariintaada Boss. Maxaan maanta kaaga caawiyaa dhanka Trading-ka?";
                
                if(query.includes("news")) {
                    response = "NEWS: Suuqa Forex maanta wuxuu u muuqdaa mid degan, laakiin iska ilaali galabta markii suuqa New York uu furmo!";
                } else if(query.includes("trading") || query.includes("forex")) {
                    response = "TRADING: Xusuusnow saaxiib, 5k Challenge-ka wuxuu u baahan yahay Risk Management adag. Ha degdegin!";
                } else if(query.includes("magacaa")) {
                    response = "Magacaygu waa Abdiwaduud AI, waxaan ahay kaaliyahaaga rasmiga ah.";
                }

                box.innerHTML += <div style="color: #d1d5db; margin-bottom: 15px; border-left: 2px solid #238636; padding-left: 10px;"><b>AI:</b> ${response}</div>;
                box.scrollTop = box.scrollHeight; // Hoos u qaad chat-ka
            }, 500);
        }
    }
</script>
