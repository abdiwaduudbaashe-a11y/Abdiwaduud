<script>
    function updateClocks() {
        const fmt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        document.getElementById('local-clock').innerText = new Date().toLocaleTimeString('en-GB', fmt);
        document.getElementById('london-clock').innerText = new Date().toLocaleTimeString('en-GB', { ...fmt, timeZone: 'Europe/London' });
        document.getElementById('ny-clock').innerText = new Date().toLocaleTimeString('en-GB', { ...fmt, timeZone: 'America/New_York' });
        document.getElementById('tokyo-clock').innerText = new Date().toLocaleTimeString('en-GB', { ...fmt, timeZone: 'Asia/Tokyo' });
    }
    setInterval(updateClocks, 1000);

    function c(v) { document.getElementById('calc-screen').value += v; }
    function clr() { document.getElementById('calc-screen').value = ''; }
    function e() { 
        try { document.getElementById('calc-screen').value = eval(document.getElementById('calc-screen').value); } 
        catch { alert('Hubi xisaabta!'); clr(); } 
    }

    function askAI() {
        let input = document.getElementById('user-msg');
        let box = document.getElementById('chat-output');
        if(input.value.trim() !== "") {
            box.innerHTML += <div style="color: var(--primary); margin-top:10px;"><b>You:</b> ${input.value}</div>;
            let q = input.value.toLowerCase();
            input.value = '';
            setTimeout(() => {
                let res = "Maasha'Allah Boss, fariintaada waa la helay.";
                if(q.includes("news")) res = "NEWS: Suuqu hadda wuxuu sugayaa xogta dhaqaalaha, iska ilaali New York Open!";
                if(q.includes("trading")) res = "TRADING: Risk Management-ka ha iloobin, 1% per trade waa muhiim!";
                box.innerHTML += <div style="color: #d1d5db; margin-top:5px; border-left: 2px solid var(--success); padding-left:10px;"><b>AI:</b> ${res}</div>;
                box.scrollTop = box.scrollHeight;
            }, 600);
        }
    }
</script>
